<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Assistant | Premium Chatbot</title>
    <meta name="description" content="A premium AI-powered chatbot with text generation and image generation capabilities.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="status-dot"></div>
                <h1>AI Smart Assistant</h1>
            </div>
            <button id="clear-chat" title="Clear Chat History">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                <span>Clear Chat</span>
            </button>
        </header>

        <!-- Chat History -->
        <main class="chat-history" id="chat-history">
            <div class="message bot">
                <div class="bot-avatar">AI</div>
                <div class="message-bubble">
                    <p>Hello! I'm your <strong>AI Smart Assistant</strong>. I can help you with text queries or generate images. How can I assist you today?</p>
                    <span class="timestamp">Just now</span>
                </div>
            </div>
            <!-- Messages will appear here -->
        </main>

        <!-- Loading Indicator -->
        <div id="typing-indicator" class="typing-indicator hidden">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-container">
                <div class="toggle-container">
                    <button id="mode-toggle" class="mode-btn" data-mode="text" title="Toggle between Text and Image Generation">
                        <svg id="text-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 7V4h16v3M9 20h6M12 4v16" />
                        </svg>
                        <svg id="image-icon" class="hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <path d="M21 15l-5-5L5 21" />
                        </svg>
                        <span id="mode-label">Text Mode</span>
                    </button>
                </div>
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn" title="Send Message">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
